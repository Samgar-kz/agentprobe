name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Weekly live-LLM smoke run (Mondays 06:00 UTC). Only the live job uses this;
    # it no-ops gracefully if the OPENAI_API_KEY secret is not configured.
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (offline)
        # No API keys are set on purpose. Without OPENAI_API_KEY the semantic
        # oracle is unavailable and judge()/run_scan() fall back to the offline
        # legacy oracle, so the suite runs fully offline and deterministically.
        # `live_llm`-marked tests auto-skip without a real key (see conftest.py);
        # -m "not live_llm" makes that explicit and keeps this job free + fast.
        run: |
          pytest tests/ -v --tb=short -m "not live_llm"

      - name: Verify README results tables match data/ (no fabricated numbers)
        # Enforces CONTRIBUTING's "no fabricated results" rule: every number in
        # the README must trace to a committed CSV. Fails if the tables drift.
        run: |
          python scripts/gen_results_tables.py --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Run ruff check
        run: ruff check agentprobe/ tests/ || echo "::warning::Lint warnings present"
        continue-on-error: true

  live:
    # Real LLM integration tests. Runs only on manual dispatch or the weekly
    # schedule, and only if the OPENAI_API_KEY secret is configured. Never
    # blocks PRs and never runs without a key, so it can't turn the badge red
    # for forks/contributors.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run live LLM tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::OPENAI_API_KEY secret not set; skipping live LLM tests."
            exit 0
          fi
          pytest tests/ -v --tb=short -m live_llm
